name: Deploy EnterpriseBot to PythonAnywhere

# Despliegue automatico completo (S013, ampliado en S014). Se dispara
# en cada push a main. Hace, en este orden: git pull en el servidor
# via SSH, migrate --noinput, collectstatic --noinput --clear, reload
# de la web app via API de PythonAnywhere, y reinicio CONDICIONAL de
# las Always-on Tasks de EnterpriseBot (bridge de voz id 234987,
# worker Celery id 242133) solo cuando el diff del push toca archivos
# relevantes para cada una -- ver el paso "Detectar archivos
# cambiados" para el patron exacto. Nunca corre makemigrations (los
# archivos de migracion se generan y revisan siempre en el workspace
# de Claude antes de pushear, nunca en el servidor -- ver
# com-migrations seccion 1).

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Preparar clave SSH dedicada
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PA_SSH_PRIVATE_KEY }}" > ~/.ssh/pa_deploy_key
          chmod 600 ~/.ssh/pa_deploy_key
          ssh-keyscan -H ssh.pythonanywhere.com >> ~/.ssh/known_hosts

      - name: git pull + migrate + collectstatic en PythonAnywhere
        # BUGFIX S014 (2026-07-13): "ssh ... | tee archivo" enmascaraba
        # el código de salida real del ssh -- sin pipefail, el exit
        # status de la tubería es el de `tee` (que casi siempre es 0),
        # no el de `ssh`. Esto hizo que DOS despliegues seguidos
        # (commits 9bb32ee y ea70dcd) se reportaran en verde en GitHub
        # Actions mientras el `git pull` real fallaba en el servidor
        # con "untracked working tree files would be overwritten by
        # merge" -- el código nunca llegó a producción pese al "✅".
        # `set -o pipefail` en el shell EXTERIOR de la Action (no basta
        # con el `set -e` de dentro del script remoto de ssh, que solo
        # afecta a la sesión ssh en sí) hace que el exit code de toda
        # la tubería sea el del primer comando que falle -- ahora un
        # fallo real del ssh sí tumba este step, y los steps
        # siguientes sin `if: always()` se saltan automáticamente.
        #
        # S014 (ampliación): también captura OLD_HEAD/NEW_HEAD y
        # vuelca la lista de archivos cambiados entre marcadores
        # (CHANGED_FILES_START/END) -- el step siguiente la usa para
        # decidir si reiniciar el bridge de voz y/o el worker Celery.
        run: |
          set -o pipefail
          ssh -i ~/.ssh/pa_deploy_key MiguelAeTxio@ssh.pythonanywhere.com '
            set -e
            cd /home/MiguelAeTxio/PROJECTS/EnterpriseBot
            OLD_HEAD=$(git rev-parse HEAD)
            echo "--- git pull ---"
            git pull origin main
            NEW_HEAD=$(git rev-parse HEAD)
            source /home/MiguelAeTxio/.virtualenvs/EnterpriseBot_venv/bin/activate
            echo "--- migrate ---"
            python -m dotenv run python manage.py migrate --noinput
            echo "--- collectstatic ---"
            python -m dotenv run python manage.py collectstatic --noinput --clear
            echo "--- CHANGED_FILES_START ---"
            git diff --name-only "$OLD_HEAD" "$NEW_HEAD"
            echo "--- CHANGED_FILES_END ---"
          ' | tee /tmp/deploy_output.txt

      - name: Recargar la web app (API PythonAnywhere)
        # Explícito tras el bugfix de arriba: si el paso anterior
        # falla de verdad ahora (ya no se enmascara), este NUNCA debe
        # ejecutarse con código a medio desplegar -- if: success() es
        # el comportamiento por defecto de GitHub Actions, se deja
        # explícito aquí para que quede claro que es intencional.
        if: success()
        run: |
          curl -sf -X POST \
            "https://www.pythonanywhere.com/api/v0/user/MiguelAeTxio/webapps/enterprisebot-miguelaetxio.pythonanywhere.com/reload/" \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}"
          echo "--- Reload solicitado OK ---"

      - name: Reiniciar Always-on Tasks si el push las afecta (S014)
        # Reutiliza el mismo secret PA_API_TOKEN que ya usa el paso de
        # reload de arriba -- un token de API de PythonAnywhere es a
        # nivel de cuenta, no hace falta uno nuevo por endpoint.
        #
        # IDs reales de las Always-on Tasks de EnterpriseBot
        # (confirmados vía API en S014 -- las otras dos tareas de la
        # cuenta, 182748 y 209547, son de Campus Studio Online, nunca
        # tocarlas desde aquí):
        #   234987 -- Bridge de Voz Conversacional (voice_orchestrator.py)
        #   242133 -- Worker Celery (procesamiento de partes de trabajo PDF)
        #
        # Patrones de disparo, decididos con Miguel Ángel en S014:
        #   Bridge -- vox_bridge/**, voice_orchestrator.py,
        #             voice_sidecar_bridge.py, ivr_config/services.py,
        #             y (AMPLIADO S025, hallazgo real) whatsapp/** --
        #             vox_bridge/services.py importa whatsapp.services
        #             (send_capture_notification, send_template,
        #             send_quick_reply) con imports locales dentro de
        #             funciones; Python cachea el módulo tras la
        #             primera importación del proceso, así que un fix
        #             en whatsapp/services.py no llega al bridge en
        #             ejecución sin reiniciarlo. NUNCA reiniciar el
        #             bridge sin confirmar antes con Miguel Ángel --
        #             corta llamadas IVR en curso.
        #   Celery -- cualquier tasks.py del proyecto, ai_services/**
        #             (cliente Gemini compartido usado por las tareas),
        #             enterprise_core/celery.py, start_celery_worker.sh,
        #             y (AMPLIADO S025, hallazgo real -- ver más abajo)
        #             machine_documents/**, personal_documents/**,
        #             document_ingestion/**, document_management/**,
        #             spare_parts/gcs_service.py.
        #
        # ⛔ INCIDENTE S025: el patrón original solo cubría tasks.py y
        # ai_services/, pero machine_documents.tasks/document_ingestion.
        # tasks/personal_documents.tasks importan de verdad módulos de
        # document_management/ (alert_service.py, vigencia_service.py,
        # models.py), document_ingestion/ (entity_matching_service.py,
        # deduplication_service.py) y spare_parts/gcs_service.py -- un
        # fix real en document_management/alert_service.py (S025, no
        # crear alertas de documentos ya caducados) se desplegó al
        # servidor (git pull correcto, verificado) pero el worker
        # Celery NUNCA se reinició porque ningún patrón lo cubría --
        # el proceso en memoria siguió ejecutando la versión vieja
        # durante varias pruebas reales, hasta que Miguel Ángel
        # reportó con datos que las alertas de documentos caducados
        # seguían creándose pese al fix ya desplegado. Patrón
        # ampliado a las carpetas completas de dominio, no solo a
        # tasks.py, para que esto no vuelva a pasar con ningún otro
        # módulo que esas tareas importen.
        if: success()
        run: |
          set -o pipefail
          CHANGED=$(sed -n '/--- CHANGED_FILES_START ---/,/--- CHANGED_FILES_END ---/p' /tmp/deploy_output.txt | sed '1d;$d')
          {
            echo "Archivos cambiados en este despliegue:"
            echo "$CHANGED"
            echo ""

            if echo "$CHANGED" | grep -qE '^(vox_bridge/|voice_orchestrator\.py|voice_sidecar_bridge\.py|ivr_config/services\.py|whatsapp/services\.py|whatsapp/models\.py)'; then
              echo "--- Bridge de voz: cambios relevantes detectados, reiniciando (id 234987) ---"
              curl -sf -X POST "https://www.pythonanywhere.com/api/v0/user/MiguelAeTxio/always_on/234987/restart/" \
                -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}"
              echo ""
              echo "Bridge de voz: reinicio solicitado OK."
            else
              echo "Bridge de voz: sin cambios relevantes, no se reinicia."
            fi

            if echo "$CHANGED" | grep -qE '(tasks\.py$|ai_services/|enterprise_core/celery\.py|start_celery_worker\.sh|machine_documents/|personal_documents/|document_ingestion/|document_management/|spare_parts/gcs_service\.py|spare_parts/services\.py)'; then
              echo "--- Worker Celery: cambios relevantes detectados, reiniciando (id 242133) ---"
              curl -sf -X POST "https://www.pythonanywhere.com/api/v0/user/MiguelAeTxio/always_on/242133/restart/" \
                -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}"
              echo ""
              echo "Worker Celery: reinicio solicitado OK."
            else
              echo "Worker Celery: sin cambios relevantes, no se reinicia."
            fi
          } | tee /tmp/restart_output.txt

      - name: Resumen del despliegue (mantener informado a Miguel Angel)
        # BUGFIX S014 (2026-07-13, segunda parte): interpolar
        # ${{ github.event.head_commit.message }} directamente dentro
        # del texto del script (echo "...${{ }}...") rompe en cuanto el
        # mensaje del commit tiene varias líneas, comillas, paréntesis
        # o la palabra EOF -- GitHub sustituye ${{ }} como texto plano
        # ANTES de que bash lo ejecute, así que un mensaje de commit
        # largo (como el propio commit de cierre de esta sesión) puede
        # corromper el script generado y hacer fallar el step entero
        # (visto en vivo: "line 100: ...: No such file or directory").
        # Solución estándar: pasar el valor vía `env:` (el runner lo
        # expone como variable de entorno normal, sin interpolación de
        # texto) y referenciarlo como "$COMMIT_MESSAGE" dentro del
        # script -- inmune al contenido, cite lo que cite.
        if: always()
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          {
            echo "## Despliegue EnterpriseBot -- $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "**Commit:** \`${{ github.sha }}\`"
            echo "**Mensaje (primera línea):** $(printf '%s' "$COMMIT_MESSAGE" | head -1)"
            echo ""
            echo "### Salida del servidor"
            echo '```'
            cat /tmp/deploy_output.txt 2>/dev/null || echo "(sin salida capturada -- revisar el paso anterior)"
            echo '```'
            if grep -q "No migrations to apply" /tmp/deploy_output.txt 2>/dev/null; then
              echo ""
              echo "Sin migraciones nuevas aplicadas en este despliegue."
            else
              echo ""
              echo "**Atencion: puede haberse aplicado una migracion nueva -- revisar la salida de arriba.**"
            fi
            echo ""
            echo "### Always-on Tasks (bridge de voz / worker Celery)"
            echo '```'
            cat /tmp/restart_output.txt 2>/dev/null || echo "(sin ejecutar -- revisar el paso anterior)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Limpiar clave SSH
        if: always()
        run: rm -f ~/.ssh/pa_deploy_key
