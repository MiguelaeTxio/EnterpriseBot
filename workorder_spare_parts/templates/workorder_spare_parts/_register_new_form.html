{# Fragmento HTMX -- Caso C, alta ad-hoc + consumo (digitalizacion organica). H10 Paso 4, bloque 3/4. #}
{% if error %}
<div class="alert alert-danger py-2 mb-2">{{ error }}</div>
{% endif %}
<form method="post"
      action="{% url 'workorder_spare_parts:register_new' entry_line.pk %}"
      hx-post="{% url 'workorder_spare_parts:register_new' entry_line.pk %}"
      hx-target="#spare-part-register-new-{{ entry_line.pk }}"
      hx-swap="innerHTML"
      class="border rounded p-2">
    {% csrf_token %}
    <div class="mb-2">
        <label class="form-label small mb-1">Descripción</label>
        <input type="text" name="description" class="form-control form-control-sm" required>
    </div>
    <div class="mb-2">
        <label class="form-label small mb-1">Referencia proveedor (opcional)</label>
        <input type="text" name="reference" class="form-control form-control-sm">
    </div>
    <div class="form-check mb-2">
        <input type="checkbox" name="is_uncountable" id="id_is_uncountable_new" class="form-check-input"
               onchange="document.getElementById('countable-fields').classList.toggle('d-none', this.checked); document.getElementById('uncountable-fields').classList.toggle('d-none', !this.checked);">
        <label class="form-check-label small" for="id_is_uncountable_new">Es incontable (nivel, no cantidad)</label>
    </div>
    <div id="countable-fields" class="row mb-2">
        <div class="col-6">
            <label class="form-label small mb-1">Cantidad usada ahora</label>
            <input type="number" step="0.01" name="quantity_used" class="form-control form-control-sm" value="1">
        </div>
        <div class="col-6">
            <label class="form-label small mb-1">Quedan en almacén (tras este uso)</label>
            <input type="number" step="0.01" name="stock_quantity_remaining" class="form-control form-control-sm" value="0">
        </div>
    </div>
    <div id="uncountable-fields" class="mb-2 d-none">
        <label class="form-label small mb-1">Nivel restante</label>
        <select name="stock_level_remaining" class="form-select form-select-sm">
            <option value="FULL">Lleno</option>
            <option value="MEDIUM">Medio</option>
            <option value="LOW">Bajo</option>
            <option value="EMPTY">Vacío</option>
        </select>
    </div>
    <div class="mb-2">
        <label class="form-label small mb-1">Notas (opcional)</label>
        <input type="text" name="notes" class="form-control form-control-sm">
    </div>
    <button type="submit" class="btn btn-sm btn-primary">Registrar y usar</button>
</form>
