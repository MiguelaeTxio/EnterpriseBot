{# Assistance Tour Engine — central tour manager for ASSISTANCE role views.                #}
{# Motor de tours ASSISTANCE — gestor central de tours para las vistas del rol asistencia. #}
<script>
(function () {
    "use strict";

    var LS_PREFIX   = "eb_tour_";
    var _registry   = {};
    var _activeTour = null;
    var _driverInst = null;

    function _getDriver() {
        if (_driverInst) { return _driverInst; }
        if (!window.driver || !window.driver.js) {
            console.warn("# [EbTourA] Driver.js no esta disponible todavia.");
            return null;
        }
        _driverInst = window.driver.js.driver({
            showProgress: true,
            animate:      true,
            overlayColor: "rgba(0,0,0,0.55)",
            stagePadding: 6,
            allowClose:   true,
            nextBtnText:  "Siguiente",
            prevBtnText:  "Anterior",
            doneBtnText:  "Entendido",
            progressText: "Paso {{current}} de {{total}}",
            onDestroyed:  function () { _driverInst = null; },
            onHighlightStarted: function (element) {
                if (element && element.scrollIntoView) {
                    element.scrollIntoView({ block: "center", inline: "nearest", behavior: "smooth" });
                }
            },
        });
        return _driverInst;
    }

    window.EbTourA = {

        register: function (name, steps) {
            _registry[name] = steps;
            _activeTour     = name;
        },

        start: function (name) {
            var tourName = name || _activeTour;
            if (!tourName || !_registry[tourName]) {
                console.warn("# [EbTourA] Tour no encontrado: " + tourName);
                return;
            }
            var d = _getDriver();
            if (!d) { return; }
            d.setSteps(_registry[tourName]);
            d.drive();
        },

        startIfNew: function (name) {
            var tourName = name || _activeTour;
            if (!tourName) { return; }
            var key = LS_PREFIX + tourName;
            try {
                if (localStorage.getItem(key)) { return; }
                localStorage.setItem(key, "1");
            } catch (e) { /* localStorage no disponible */ }
            this.start(tourName);
        },

        reset: function (name) {
            try { localStorage.removeItem(LS_PREFIX + (name || _activeTour)); }
            catch (e) { /* ignorar */ }
        },

        resetAll: function () {
            try {
                Object.keys(localStorage).forEach(function (k) {
                    if (k.indexOf(LS_PREFIX) === 0) { localStorage.removeItem(k); }
                });
            } catch (e) { /* ignorar */ }
        },
    };

    document.addEventListener("DOMContentLoaded", function () {
        var btn = document.getElementById("btn-tour-help");
        if (!btn) { return; }
        btn.addEventListener("click", function () {
            window.EbTourA.start();
        });
    });

}());
</script>
